<!DOCTYPE html>
    <html>
        <head>
            <title>T.O.F.U</title>
            <link rel="stylesheet" type="text/css" href="css/styles.css">
        </head>
        <body>
            <div class="top-banner" id="top">
                <div>
                    <img src="images/tofu.jpg" alt="Company Logo" class="profile-img" />
                </div>
                <div class="restaurant-name">
                    <h1 class="name">T.O.F.U</h1>
                    <p class="description">The Only Food U'll Ever Need!</p>
                </div>
            </div>

            <div class="navigation">
                <a href="index.html">Home</a>
                <a href="branches.html">Branches</a>
                <a href="gallery.html">Gallery</a>
                <a href="customer_feedback.html">Customer Feedback</a>
                <a href="contacts.html">Contacts</a>
            </div>

            <div class="menu">
                <div class="item">
                    <img src="images/tofu_burger.webp" alt="Tofu Burger">
                    <h2>Tofu Burger</h2>
                    <p class="price">$8.99</p>
                </div>

                <div class="item">
                    <img src="images/crispy_tofu_bites.webp" alt="Crispy Tofu Bites">
                    <h2>Crispy Tofu Bites</h2>
                    <p class="price">$6.99</p>
                </div>

                <div class="item">
                    <img src="images/tofu_rice_bowls.webp" alt="Tofu Rice Bowl">
                    <h2>Tofu Rice Bowl</h2>
                    <p class="price">$10.99</p>
                </div>
            </div>

            <div class="menu">
                <div class="item">
                    <img src="images/tofu_katsu.webp" alt="Tofu Katsu" id="tofu_katsu">
                    <h2>Tofu Katsu</h2>
                    <p class="price">$11.99</p>
                </div>

                <div class="item">
                    <img src="images/tofu_wrap.webp" alt="Spicy Tofu Wrap">
                    <h2>Spicy Tofu Wrap</h2>
                    <p class="price">$9.99</p>
                </div>

                <div class="item">
                    <img src="images/tofu_milkshake.jpg" alt="Tofu Milkshake">
                    <h2>Tofu Milkshake</h2>
                    <p class="price">$5.99</p>
                </div>
            </div>

            <footer>
            © 2026 T.O.F.U
            </footer>
        </body>
    </html>
